name: Compilar y ejecutar

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar
        run: mvn compile

      - name: Ejecutar
        run: mvn exec:java
